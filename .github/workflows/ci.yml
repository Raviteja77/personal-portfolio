name: CI

on:
  push:
    branches: [main, dev, "phase/*"]
  pull_request:
    branches: [main, dev]

jobs:
  quality:
    name: Type Check · Lint · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://raviteja.dev' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'placeholder' }}
